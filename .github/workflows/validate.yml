name: Validate State File

on:
  push:
    branches: [main]
    paths:
      - 'current-iteration.md'
      - 'references/iteration-state-template.md'
      - 'scripts/**'
      - 'schema/**'
  pull_request:
    branches: [main]
    paths:
      - 'current-iteration.md'
      - 'references/iteration-state-template.md'
      - 'scripts/**'
      - 'schema/**'
      - 'tests/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python3

      - name: Run state validation tests
        run: bash tests/test-validate-state.sh

      - name: Validate template integrity
        run: bash scripts/validate-state.sh references/iteration-state-template.md

      - name: Run constraint checks
        run: bash scripts/check-constraints.sh tests/fixtures/valid-state.md
